<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Format & Validate</title>
  <meta name="description" content="Format, validate, and minify JSON in the browser">
  <style>
    :root {
      --bg:         #1e1e2e;
      --surface:    #2a2a3d;
      --accent:     #7c6af7;
      --text:       #cdd6f4;
      --text-muted: #6c7086;
      --border:     #313244;
      --success:    #a6e3a1;
      --error:      #f38ba8;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header a { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; }
    header a:hover { color: var(--accent); }
    header h1 { margin: 0; font-size: 1.2rem; }

    main {
      padding: 2rem;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .toolbar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .indent-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    button.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .panes {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      flex: 1;
    }

    .pane {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .pane label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .pane-header {
      display: flex;
      align-items: center;
      margin-bottom: 0.4rem;
    }
    .pane-header label {
      margin-bottom: 0;
      flex: 1;
    }

    textarea {
      overflow-y: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.82rem;
      padding: 0.75rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea.err    { border-color: var(--error); }

    .status {
      font-size: 0.8rem;
      font-family: monospace;
      min-height: 1.2rem;
    }

    .status.ok  { color: var(--success); }
    .status.err { color: var(--error); }
  </style>
</head>
<body>
  <header>
    <a href="../">← back</a>
    <h1>JSON Format &amp; Validate</h1>
  </header>

  <main>
    <div class="toolbar">
      <button id="btn-format">Format</button>
      <button id="btn-minify" class="secondary">Minify</button>
      <button id="btn-validate" class="secondary">Validate</button>
      <button id="btn-clear" class="secondary">Clear</button>
      <span class="indent-label">
        Indent:
        <select id="indent">
          <option value="2" selected>2 spaces</option>
          <option value="4">4 spaces</option>
          <option value="	">tab</option>
        </select>
      </span>
    </div>

    <div class="panes">
      <div class="pane">
        <label for="input">Input — JSON or NDJSON (one or more documents, compact or pretty-printed)</label>
        <textarea id="input" rows="6" placeholder='{"paste": "your JSON here"}' spellcheck="false"></textarea>
      </div>
      <div class="pane">
        <div class="pane-header">
          <label for="output">Output</label>
          <span id="status" class="status"></span>
        </div>
        <textarea id="output" rows="6" placeholder="Formatted output…" spellcheck="false" readonly></textarea>
      </div>
    </div>
  </main>

  <script>
    const inputEl  = document.getElementById('input');
    const outputEl = document.getElementById('output');
    const statusEl = document.getElementById('status');
    const indentEl = document.getElementById('indent');

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }

    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = `status ${type}`;
    }

    function getIndent() {
      const v = indentEl.value;
      return v === '\t' ? '\t' : parseInt(v, 10);
    }

    function parseDocuments(text) {
      const records = [];
      const parseErrors = [];
      let depth = 0, inString = false, escape = false;
      let start = -1, startLine = 1, currentLine = 1;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (ch === '\n') currentLine++;
        if (escape) { escape = false; continue; }
        if (inString) {
          if (ch === '\\') escape = true;
          else if (ch === '"') inString = false;
          continue;
        }
        if (ch === '"') { inString = true; continue; }
        if (ch === '{' || ch === '[') {
          if (depth === 0) { start = i; startLine = currentLine; }
          depth++;
        } else if (ch === '}' || ch === ']') {
          if (--depth === 0 && start !== -1) {
            const chunk = text.slice(start, i + 1);
            try {
              records.push({ index: records.length + 1, data: JSON.parse(chunk), startLine });
            } catch (e) {
              parseErrors.push({ startLine, snippet: chunk.slice(0, 80), message: e.message });
            }
            start = -1;
          }
        }
      }
      if (start !== -1) {
        parseErrors.push({ startLine, snippet: text.slice(start, start + 80), message: 'Unexpected end of input' });
      }
      return { records, parseErrors };
    }

    function countNodes(obj) {
      if (typeof obj !== 'object' || obj === null) return 1;
      return 1 + Object.values(obj).reduce((s, v) => s + countNodes(v), 0);
    }

    function applyResult({ records, parseErrors }) {
      inputEl.classList.toggle('err', parseErrors.length > 0);
      if (parseErrors.length > 0 && records.length === 0) {
        setStatus(`parse error: ${parseErrors[0].message}`, 'err');
      } else if (parseErrors.length > 0) {
        setStatus(`${records.length} parsed · ${parseErrors.length} parse error(s)`, 'err');
      } else if (records.length === 1) {
        const nodes = countNodes(records[0].data);
        setStatus(`valid · ${nodes} nodes`, 'ok');
      } else {
        const nodes = records.reduce((s, r) => s + countNodes(r.data), 0);
        setStatus(`${records.length} documents · ${nodes} nodes total`, 'ok');
      }
      return records;
    }

    document.getElementById('btn-format').onclick = () => {
      const { records, parseErrors } = parseDocuments(inputEl.value);
      applyResult({ records, parseErrors });
      if (records.length > 0) {
        outputEl.value = records.map(r => JSON.stringify(r.data, null, getIndent())).join('\n\n');
        autoResize(outputEl);
      } else {
        outputEl.value = '';
      }
    };

    document.getElementById('btn-minify').onclick = () => {
      const { records, parseErrors } = parseDocuments(inputEl.value);
      applyResult({ records, parseErrors });
      if (records.length > 0) {
        outputEl.value = records.map(r => JSON.stringify(r.data)).join('\n');
        autoResize(outputEl);
      } else {
        outputEl.value = '';
      }
    };

    document.getElementById('btn-validate').onclick = () => {
      const { records, parseErrors } = parseDocuments(inputEl.value);
      applyResult({ records, parseErrors });
    };

    document.getElementById('btn-clear').onclick = () => {
      inputEl.value = '';
      outputEl.value = '';
      inputEl.classList.remove('err');
      setStatus('');
      autoResize(inputEl);
      autoResize(outputEl);
    };

    inputEl.addEventListener('input', () => autoResize(inputEl));

    // Auto-format on paste
    inputEl.addEventListener('paste', () => {
      setTimeout(() => {
        autoResize(inputEl);
        if (!inputEl.value.trim()) return;
        const { records, parseErrors } = parseDocuments(inputEl.value);
        applyResult({ records, parseErrors });
        if (records.length > 0) {
          outputEl.value = records.map(r => JSON.stringify(r.data, null, getIndent())).join('\n\n');
          autoResize(outputEl);
        }
      }, 0);
    });
  </script>
</body>
</html>
