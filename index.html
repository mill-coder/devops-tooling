<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Tooling</title>
  <meta name="description" content="Collection of browser-based DevOps helper tools">
  <style>
    :root {
      --bg:          #1e1e2e;
      --surface:     #2a2a3d;
      --accent:      #7c6af7;
      --text:        #cdd6f4;
      --text-muted:  #6c7086;
      --border:      #313244;
      --success:     #a6e3a1;
      --error:       #f38ba8;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 2rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      margin: 0 0 0.25rem;
      font-size: 1.6rem;
      color: var(--accent);
    }

    header p {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    main {
      padding: 2rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: border-color 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .card h2 {
      margin: 0;
      font-size: 1rem;
    }

    .badge-proxy {
      font-size: 0.7rem;
      background: color-mix(in srgb, var(--accent) 20%, transparent);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      white-space: nowrap;
    }

    .card p {
      margin: 0;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .error-msg {
      color: var(--error);
      font-size: 0.9rem;
    }

    .proxy-notice {
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>DevOps Tooling</h1>
    <p>Browser-based helper tools for daily DevOps work</p>
  </header>

  <main>
    <div id="proxy-notice" class="proxy-notice" style="display:none">
      Some tools require the backend proxy. Start <code>python app.py</code> to enable them.
    </div>

    <div class="grid" id="grid">
      <p id="loading" style="color:var(--text-muted)">Loading tools…</p>
    </div>
  </main>

  <script>
    let allTools = [];

    async function checkBackend() {
      try {
        const r = await fetch('/tools.json', { signal: AbortSignal.timeout(1000) });
        return r.ok;
      } catch {
        return false;
      }
    }

    function toolUrl(tool) {
      if (window.location.protocol === 'file:') return tool.file;
      return `/tools/${tool.id}`;
    }

    function render(tools) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      tools.forEach(tool => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = toolUrl(tool);
        a.innerHTML = `
          <div class="card-header">
            <h2>${tool.name}</h2>
            ${tool.proxy ? '<span class="badge-proxy">proxy</span>' : ''}
          </div>
          <p>${tool.description}</p>
        `;
        grid.appendChild(a);
      });
    }

    async function init() {
      const backendUp = await checkBackend();

      try {
        const src = window.location.protocol === 'file:' ? 'tools.json' : '/tools.json';
        const resp = await fetch(src);
        if (!resp.ok) throw new Error(resp.statusText);
        allTools = await resp.json();
      } catch (e) {
        document.getElementById('loading').outerHTML =
          `<p class="error-msg">Failed to load tools.json: ${e.message}</p>`;
        return;
      }

      if (!backendUp && allTools.some(t => t.proxy)) {
        document.getElementById('proxy-notice').style.display = '';
      }

      render(allTools);
    }

    init();
  </script>
</body>
</html>
